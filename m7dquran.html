<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐌𝐮𝐡𝐚𝐦𝐦𝐚𝐝 𝐖𝐚𝐥𝐚' 𝐚𝐥-𝐃𝐢𝐧</title>
    <style>
        :root {
            --main-bg: #000;
            --accent: #00ffcc;
            --card-grad: linear-gradient(180deg, #ffffff 0%, #1a1a1a 100%);
            --modal-grad: linear-gradient(145deg, #000000 0%, #002b22 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--main-bg); color: white; overflow-x: hidden; }

        /* فيديو الخلفية */
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: blur(10px) brightness(0.3); }

        header { text-align: center; padding: 30px 20px; }
        .dev-name { 
            font-size: 2.2rem; font-weight: 900; color: #fff;
            text-shadow: 0 0 10px var(--accent);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { from { text-shadow: 0 0 10px #fff; } to { text-shadow: 0 0 20px var(--accent); } }

        /* زر الانستقرام المحدث */
        .insta-btn {
            background: #fff; color: #000; text-decoration: none; padding: 8px 20px;
            border-radius: 50px; display: inline-flex; align-items: center; gap: 8px;
            font-weight: bold; margin: 15px 0; font-size: 1.1rem; transition: 0.3s;
        }

        .top-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--accent);
            color: white; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: bold;
        }

        .search-box {
            padding: 15px; width: 90%; max-width: 450px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.6);
            color: white; text-align: center; outline: none;
        }

        .surah-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px; padding: 20px; max-width: 1200px; margin: auto;
        }

        .surah-card {
            background: var(--card-grad); padding: 20px; border-radius: 20px;
            text-align: center; color: #000;
        }
        .btn-main {
            background: #004d40; color: white; border: none; padding: 12px;
            border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px;
        }

        /* النوافذ */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--modal-grad); width: 95%; max-width: 700px; height: 85vh;
            border-radius: 25px; border: 1px solid var(--accent); overflow-y: auto; position: relative;
        }
        .sticky-header {
            position: sticky; top: 0; background: rgba(0,0,0,0.9);
            padding: 15px; border-bottom: 1px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .close-btn { font-size: 2rem; color: #fff; background: none; border: none; cursor: pointer; }

        /* المسبحة */
        .tasbih-ui { text-align: center; padding: 20px; }
        .tasbih-option {
            background: rgba(255,255,255,0.1); padding: 15px; margin: 10px auto;
            width: 80%; border-radius: 15px; border: 1px solid var(--accent);
            animation: shake 3s infinite ease-in-out; color: #fff; font-weight: bold;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        .tasbih-circle {
            width: 180px; height: 180px; border: 5px solid var(--accent);
            border-radius: 50%; margin: 20px auto; display: flex;
            align-items: center; justify-content: center; font-size: 3.5rem;
            color: var(--accent); font-weight: 900; cursor: pointer; user-select: none;
        }

        /* الأذكار */
        .zekr-item { background: rgba(255,255,255,0.05); padding: 20px; margin: 10px; border-radius: 15px; line-height: 1.8; text-align: justify; border-right: 4px solid var(--accent); }
        .quran-text { padding: 25px; line-height: 2.6; font-size: 1.5rem; text-align: center; }
        .ayah-num { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://files.catbox.moe/1gakne.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <div class="dev-name">𝐌𝐮𝐡𝐚𝐦𝐦𝐚𝐝 𝐖𝐚𝐥𝐚' 𝐚𝐥-𝐃𝐢𝐧</div>
        <br>
        <a href="https://www.instagram.com/bh4l_1956" class="insta-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" width="22">
            𝐃𝐞𝐯𝐞𝐥𝐨𝐩𝐞𝐫
        </a>

        <div class="top-nav">
            <button class="nav-btn" onclick="openTasbih()">📿 المسبحة</button>
            <button class="nav-btn" onclick="openAzkar('morning')">☀️ أذكار الصباح</button>
            <button class="nav-btn" onclick="openAzkar('evening')">🌙 أذكار المساء</button>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="فتش السوره الدايرها">
    </header>

    <div class="surah-container" id="surahList"></div>

    <div id="mainModal" class="modal">
        <div class="modal-content">
            <div class="sticky-header">
                <h2 id="modalTitle" style="color: var(--accent);"></h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
        let count = 0;
        
        function toZakhrafa(n) {
            const map = {'0':'𝟎','1':'𝟏','2':'𝟐','3':'𝟑','4':'𝟒','5':'𝟓','6':'𝟔','7':'𝟕','8':'𝟖','9':'𝟗'};
            return n.toString().split('').map(d => map[d] || d).join('');
        }

        function render(filter = "") {
            const list = document.getElementById('surahList');
            list.innerHTML = "";
            surahNames.forEach((name, i) => {
                if (name.includes(filter)) {
                    const card = document.createElement('div');
                    card.className = "surah-card";
                    card.innerHTML = `<h3>${name}</h3><button class="btn-main" onclick="openSurah(${i+1},'${name}')">عرض نص السورة</button>`;
                    list.appendChild(card);
                }
            });
        }

        function openTasbih() {
            const modal = document.getElementById('mainModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalTitle').innerText = "المسبحة";
            modal.style.display = "flex";
            body.innerHTML = `
                <div class="tasbih-ui">
                    <div class="tasbih-option">سبحان الله</div>
                    <div class="tasbih-option">الحمد لله</div>
                    <div class="tasbih-option">الله أكبر</div>
                    <div class="tasbih-circle" onclick="this.innerText = toZakhrafa(++count)">𝟎</div>
                    <button class="btn-main" style="width:120px" onclick="count=0; document.querySelector('.tasbih-circle').innerText='𝟎'">تصفير</button>
                </div>`;
        }

        async function openSurah(id, name) {
            const modal = document.getElementById('mainModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalTitle').innerText = "سورة " + name;
            modal.style.display = "flex";
            body.innerHTML = "<p style='text-align:center;padding:20px'>جاري التحميل...</p>";
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                let html = `<div class="quran-text">`;
                data.data.ayahs.forEach((a, idx) => html += `${a.text} <span class="ayah-num">(${toZakhrafa(idx+1)})</span> `);
                body.innerHTML = html + "</div>";
            } catch(e) { body.innerText = "تأكد من الاتصال."; }
        }

        function openAzkar(type) {
            const modal = document.getElementById('mainModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalTitle').innerText = (type === 'morning' ? "أذكار الصباح" : "أذكار المساء");
            modal.style.display = "flex";
            const azkar = type === 'morning' ? morningList : eveningList;
            body.innerHTML = azkar.map(z => `<div class="zekr-item">${z}</div>`).join("");
        }

        function closeModal() { document.getElementById('mainModal').style.display = "none"; }

        const morningList = ["أصبحنا وأصبح الملك لله والحمد لله، لا إله إلا الله وحده لا شريك له...", "اللهم بك أصبحنا وبك أمسينا وبك نحيا وبك نموت وإليك النشور.", "آية الكرسي: الله لا إله إلا هو الحي القيوم..."];
        const eveningList = ["أمسينا وأمسا الملك لله والحمد لله، لا إله إلا الله وحده لا شريك له...", "اللهم بك أمسينا وبك أصبحنا وبك نحيا وبك نموت وإليك المصير."];

        document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value));
        render();
    </script>
</body>
</html>
